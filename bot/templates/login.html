<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 운동 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#1a1a24;border:1px solid #2d2d44;border-radius:16px;padding:48px 40px;text-align:center;max-width:400px;width:90%}
.login-box .logo{font-size:2em;margin-bottom:8px}
.login-box h1{font-size:1.4em;margin-bottom:8px;color:#a29bfe}
.login-box p{color:#8888a0;margin-bottom:32px;font-size:.95em}
.tg-widget{display:flex;justify-content:center;margin-top:16px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🏋️</div>
  <h1>운동 기록 대시보드</h1>
  <p>텔레그램으로 로그인하세요</p>
  <div class="tg-widget">
    <script async src="https://telegram.org/js/telegram-widget.js?22"
      data-telegram-login="{{ bot_username }}"
      data-size="large"
      data-auth-url="{{ web_url }}/auth/telegram"
      data-request-access="write">
    </script>
  </div>
  <noscript>
    <p style="color:#ff7675;margin-top:16px">JavaScript를 활성화해주세요.</p>
  </noscript>
</div>
</body>
</html>
